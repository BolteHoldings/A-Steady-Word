name: Make keystore

on:
  workflow_dispatch: {}

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore
        run: |
          STORE_PW=$(openssl rand -base64 24 | tr -d '/+=' | cut -c1-24)
          keytool -genkeypair -v \
            -keystore upload-keystore.jks \
            -alias upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PW" -keypass "$STORE_PW" \
            -dname "CN=Patriarch Legacy Press, OU=Apps, O=Patriarch Legacy Press, L=NA, ST=NA, C=US"
          echo "=== COPY THESE INTO GITHUB SECRETS ===" > secrets.txt
          echo "" >> secrets.txt
          echo "KEYSTORE_PASSWORD:" >> secrets.txt
          echo "$STORE_PW" >> secrets.txt
          echo "" >> secrets.txt
          echo "KEY_PASSWORD:" >> secrets.txt
          echo "$STORE_PW" >> secrets.txt
          echo "" >> secrets.txt
          echo "KEY_ALIAS:" >> secrets.txt
          echo "upload" >> secrets.txt
          echo "" >> secrets.txt
          echo "KEYSTORE_BASE64 (the long line below):" >> secrets.txt
          base64 -w0 upload-keystore.jks >> secrets.txt

      - uses: actions/upload-artifact@v4
        with:
          name: keystore-and-secrets
          path: |
            upload-keystore.jks
            secrets.txt
