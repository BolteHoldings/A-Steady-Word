name: Build Android App Bundle (.aab)

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add / sync Android platform
        run: npx cap add android || npx cap sync android

      - name: Set version from CI run number
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.0.${{ github.run_number }}\"/" android/app/build.gradle

      - name: Bump target/compile SDK to 35
        run: |
          sed -i 's/compileSdk .*/compileSdk 35/' android/variables.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/variables.gradle
          cat android/variables.gradle

      - name: Decode upload keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Configure Gradle signing
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          cat >> android/app/build.gradle <<'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file('upload-keystore.jks')
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build release bundle (.aab)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: cd android && ./gradlew bundleRelease

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: steady-word-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
